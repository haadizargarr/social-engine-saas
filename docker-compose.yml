version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: social_engine_db
    environment:
      POSTGRES_USER: engine_user
      POSTGRES_PASSWORD: engine_password
      POSTGRES_DB: social_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: social_engine_cache
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
